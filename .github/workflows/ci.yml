name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install packages
        run: |
          pip install -e ./packages/sdk pytest pytest-timeout ruff
      - name: Import smoke test
        run: |
          python -c "import interlatent; import interlatent.inference.client; import interlatent.node.cli; import interlatent.cli.main"
      - name: Test suite (unit + e2e, no GPU, no robot)
        run: |
          pytest tests/ -v --timeout=120
      - name: Lint
        run: |
          ruff check .
      - name: Wheel builds and contains every entry-point module
        run: |
          pip install build
          python -m build --wheel ./packages/sdk -o /tmp/wheels
          python - <<'EOF'
          import glob, zipfile
          required = {
              "interlatent-": ["interlatent/node/cli.py",                # interlatent-node
                               "interlatent/node/act_cli.py",             # interlatent-act
                               "interlatent/cli/main.py",                 # interlatent
                               "interlatent/inference/integration/preflight.py",  # interlatent-preflight
                               "interlatent/adapters/lerobot/sync_inference/sync_rollout.py"],  # interlatent-sync-rollout
          }
          for prefix, files in required.items():
              [wheel] = [w for w in glob.glob("/tmp/wheels/*.whl") if w.split("/")[-1].startswith(prefix)]
              names = zipfile.ZipFile(wheel).namelist()
              for f in files:
                  assert f in names, f"{f} missing from {wheel}"
          print("all wheels complete")
          EOF

  secret-scan:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # gitleaks-action v2 requires a paid license for organization repos. Run it only
      # when the GITLEAKS_LICENSE secret is configured; skip cleanly otherwise so the
      # check doesn't hard-fail on forks or before the secret is set.
      - name: Secret scan (gitleaks)
        if: env.GITLEAKS_LICENSE != ''
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ env.GITLEAKS_LICENSE }}

  dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-off
        run: |
          missing=0
          # --no-merges: on a pull_request build HEAD is the synthetic
          # refs/pull/N/merge commit, which has no sign-off and isn't ours to sign.
          for sha in $(git rev-list --no-merges origin/${{ github.base_ref }}..HEAD); do
            if ! git log -1 --format=%B "$sha" | grep -qi '^Signed-off-by:'; then
              echo "Missing Signed-off-by: $sha"; missing=1
            fi
          done
          exit $missing
