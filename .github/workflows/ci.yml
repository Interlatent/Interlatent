name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install packages
        run: |
          pip install -e ./packages/sdk -e ./packages/server -e ./packages/teleop pytest pytest-timeout ruff
      - name: Import smoke test
        run: |
          python -c "import interlatent; import interlatent.inference.client; import interlatent.node.cli"
          python -c "import interlatent_server.server.transport; import interlatent_server.server.app"
          python -c "import interlatent_teleop.protocol.teleop_pb2"
      - name: Test suite (unit + e2e, no GPU, no robot)
        run: |
          pytest tests/ -v --timeout=120
      - name: Loopback end-to-end (echo backend, no GPU)
        run: |
          timeout 120 python examples/01_loopback_no_hardware.py --steps 30
      - name: Lint
        run: |
          ruff check .
      - name: Wheels build and contain every entry-point module
        run: |
          pip install build
          for pkg in sdk server teleop; do python -m build --wheel ./packages/$pkg -o /tmp/wheels; done
          python - <<'EOF'
          import glob, zipfile
          required = {
              "interlatent-": ["interlatent/node/cli.py",
                               "interlatent/inference/integration/rollout.py"],
              "interlatent_server-": ["interlatent_server/server/app.py"],
              "interlatent_teleop-": ["interlatent_teleop/pi/__main__.py",
                                      "interlatent_teleop/laptop/keyboard_cli.py"],
          }
          for prefix, files in required.items():
              [wheel] = [w for w in glob.glob("/tmp/wheels/*.whl") if w.split("/")[-1].startswith(prefix)]
              names = zipfile.ZipFile(wheel).namelist()
              for f in files:
                  assert f in names, f"{f} missing from {wheel}"
          print("all wheels complete")
          EOF

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-off
        run: |
          missing=0
          for sha in $(git rev-list origin/${{ github.base_ref }}..HEAD); do
            if ! git log -1 --format=%B "$sha" | grep -qi '^Signed-off-by:'; then
              echo "Missing Signed-off-by: $sha"; missing=1
            fi
          done
          exit $missing
