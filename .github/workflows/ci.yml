name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Deployment hardware is ARM (Raspberry Pi / Jetson), so the suite runs on
    # both arches. ubuntu-24.04-arm is a free hosted runner for public repos.
    # fail-fast is off so an ARM-only break still leaves x86 results readable.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install packages
        run: |
          # Pillow + opencv give node/jpeg.py's fallback chain a CPU encoder.
          # Both are optional deps (Pillow via [lerobot], opencv via robot
          # extras), so a bare SDK install has no encoder and the node-jpeg
          # tests — which assert a real backend resolves — see 'none' and fail.
          pip install -e ./packages/sdk Pillow opencv-python-headless pytest pytest-timeout ruff
      - name: Import smoke test
        run: |
          pytest tests/test_lazy_imports.py -v --timeout=300
      - name: Test suite (unit + e2e, no GPU, no robot)
        run: |
          pytest tests/ -v --timeout=120
      - name: Lint
        run: |
          ruff check .
      - name: Wheel builds and contains every entry-point module
        run: |
          pip install build
          python -m build --wheel ./packages/sdk -o /tmp/wheels
          python - <<'EOF'
          import glob, pathlib, zipfile
          required = {
              "interlatent-": ["interlatent/node/cli.py",                # interlatent-node
                               "interlatent/node/act_cli.py",             # interlatent-act
                               "interlatent/cli/main.py",                 # interlatent
                               "interlatent/inference/integration/preflight.py"],  # interlatent-preflight
          }
          for prefix, files in required.items():
              [wheel] = [w for w in glob.glob("/tmp/wheels/*.whl") if w.split("/")[-1].startswith(prefix)]
              names = zipfile.ZipFile(wheel).namelist()
              for f in files:
                  assert f in names, f"{f} missing from {wheel}"
          # Robot data ships in this wheel (ADR 0017). package-data is opt-in per
          # kind, so a new robots dir can be added and silently not ship — the node
          # then cannot start QUIC teleop for it. Check the tree against the wheel.
          [wheel] = glob.glob("/tmp/wheels/interlatent-*.whl")
          names = set(zipfile.ZipFile(wheel).namelist())
          src = pathlib.Path("packages/sdk/src/interlatent_robots")
          kinds = sorted(p.name for p in src.iterdir() if p.is_dir() and p.name != "__pycache__")
          assert kinds, f"no robot kinds found under {src}"
          for kind in kinds:
              for f in src.glob(f"{kind}/*"):
                  if f.name == "ik_config.json":
                      # Repo-only curation source (ADR 0017 amendment 2026-07-18):
                      # excluded from wheels via exclude-package-data.
                      assert f"interlatent_robots/{kind}/{f.name}" not in names, \
                          f"ik_config.json must NOT ship in the wheel (ADR 0017 amendment)"
                      continue
                  if f.suffix in (".urdf", ".json", ".lock", ".py"):
                      assert f"interlatent_robots/{kind}/{f.name}" in names, \
                          (f"interlatent_robots/{kind}/{f.name} missing from {wheel} — "
                           f"add the kind to [tool.setuptools.package-data]")
          # PEP 420: the SDK must not claim the namespace (ADR 0017 point 1).
          assert "interlatent_robots/__init__.py" not in names
          print(f"all wheels complete (robot kinds: {', '.join(kinds)})")
          EOF

  extras-resolve:
    # The optional extras have never been installed or resolved in CI - only the
    # base package is. A bad pin, a typo, or a wheel that does not exist for this
    # arch therefore reaches users as a failed `pip install 'interlatent[yam]'`
    # on their robot. This resolves the full dependency graph for every extra
    # declared in pyproject.toml and installs nothing (--dry-run).
    #
    # Extras are discovered from the file, so a new one is covered automatically.
    # An extra gated to a higher interpreter than the job runs (e.g. [axol] needs
    # Python >= 3.13 via almond-axol) is reported SKIP, not FAIL.
    name: extras resolve (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Resolve every optional extra (dry run, installs nothing)
        run: |
          python - <<'EOF'
          import subprocess, sys, tomllib
          from pathlib import Path

          # Extras whose resolution is ADVISORY: always reported, never fails the
          # job. [yam] pulls i2rt straight from a git HEAD (no released metadata,
          # moves under us) and gates pyrealsense2 to x86_64, so a red here is
          # usually upstream churn rather than a defect in our declaration.
          # Keep the signal, drop the gate.
          ADVISORY = {"yam"}

          PYPROJECT = Path("packages/sdk/pyproject.toml")
          project = tomllib.loads(PYPROJECT.read_text(encoding="utf-8"))["project"]
          extras = sorted(project.get("optional-dependencies", {}))
          if not extras:
              sys.exit("no optional-dependencies in %s - did the file move?" % PYPROJECT)

          print("python      : %s" % sys.version.split()[0])
          print("pyproject   : %s (requires-python %s)"
                % (PYPROJECT, project.get("requires-python")))
          print("extras found: %s" % ", ".join(extras))

          rows, failures, advisories = [], [], []
          for extra in extras:
              target = "./packages/sdk[%s]" % extra
              print("::group::resolving %s" % target, flush=True)
              proc = subprocess.run(
                  [sys.executable, "-m", "pip", "install", "--dry-run",
                   "--ignore-installed", target],
                  capture_output=True, text=True,
              )
              out = proc.stdout + proc.stderr
              print(out, flush=True)
              print("::endgroup::", flush=True)

              if proc.returncode == 0:
                  rows.append(("OK", extra, "resolves on this interpreter/arch"))
              elif "requires a different Python" in out:
                  note = next((ln.strip() for ln in out.splitlines()
                               if "requires a different Python" in ln), "python-gated")
                  rows.append(("SKIP", extra, note))
              elif extra in ADVISORY:
                  rows.append(("WARN", extra, "did NOT resolve (advisory, not gating)"))
                  advisories.append((extra, "\n".join(out.strip().splitlines()[-20:])))
              else:
                  rows.append(("FAIL", extra, "see the group above"))
                  failures.append((extra, "\n".join(out.strip().splitlines()[-20:])))

          print()
          print("=" * 72)
          print("EXTRAS RESOLUTION SUMMARY")
          print("=" * 72)
          for status, extra, note in rows:
              print("  %-4s  [%s]  %s" % (status, extra, note))
          print("=" * 72)

          for extra, tail in advisories:
              print()
              print("::warning title=extra [%s] did not resolve::advisory only - "
                    "not failing the build" % extra)
              print("--- [%s] last lines ---" % extra)
              print(tail)

          if failures:
              print()
              for extra, tail in failures:
                  print("--- [%s] last lines ---" % extra)
                  print(tail)
                  print()
              sys.exit("%d extra(s) failed to resolve. A broken declaration here "
                       "reaches users as a failed pip install on their robot."
                       % len(failures))
          print()
          print("no gating extra failed to resolve.")
          EOF

  secret-scan:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # gitleaks-action v2 requires a paid license for organization repos. Run it only
      # when the GITLEAKS_LICENSE secret is configured; skip cleanly otherwise so the
      # check doesn't hard-fail on forks or before the secret is set.
      - name: Secret scan (gitleaks)
        if: env.GITLEAKS_LICENSE != ''
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ env.GITLEAKS_LICENSE }}

  dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-off
        run: |
          missing=0
          # --no-merges: on a pull_request build HEAD is the synthetic
          # refs/pull/N/merge commit, which has no sign-off and isn't ours to sign.
          for sha in $(git rev-list --no-merges origin/${{ github.base_ref }}..HEAD); do
            if ! git log -1 --format=%B "$sha" | grep -qi '^Signed-off-by:'; then
              echo "Missing Signed-off-by: $sha"; missing=1
            fi
          done
          exit $missing
