[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "interlatent"
version = "1.1.0"
description = "Interlatent SDK — run VLA policies on real robots and collect LeRobot datasets."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Interlatent Contributors" }]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
  "requests>=2.31.0",
  "torch>=2.0",
  "numpy>=1.21",
  "httpx",
  # DRTC client: gRPC + gRPC-Web (for the hosted Modal endpoint).
  "grpcio>=1.60",
  "grpcio-tools>=1.60",
  "protobuf>=4.25",
  "sonora>=0.2.2",
  # Node-side teleop receiver stub (node/teleop/channel.py) opens a sync
  # WebSocket to the hosted DAgger relay. Small, pure-Python.
  "websockets>=12",
]

[project.optional-dependencies]
# pip install 'interlatent[lerobot]'
# Required for LeRobotDataset upload format and HuggingFace repo-based checkpoint
# naming in the lerobot integration. lerobot >= 0.4.0 ships the v3.0 dataset writer
# that powers the SDK's upload-time rebuild path.
lerobot = [
  "huggingface_hub>=0.20",
  "lerobot>=0.4.0",
  "pyarrow>=14",
  "Pillow>=9",
]

# pip install 'interlatent[teleop-quic]'
# Low-latency in-browser teleop path: the node dials the QUIC/WebTransport relay
# and consumes joint-target datagrams (node/teleop/quic_channel.py). aioquic is
# optional — only needed on nodes running the QUIC transport; the default WS
# teleop path (node/teleop/channel.py) needs only `websockets` (a core dep).
teleop-quic = [
  # >=1.3: the video tee's stream-completion check reads
  # QuicConnection._streams (validated on 1.3.x; see quic teleop ADR).
  "aioquic>=1.3.0,<2",
]

# pip install 'interlatent[axol]'
# Drives the Almond Axol dual-arm robot via its native async SDK, through a
# native control loop (robot kind "axol"; see interlatent.adapters.axol). The
# onboard ZED cameras use almond-axol's lerobot ZedCamera (opened by serial), so
# this extra pulls in lerobot via almond-axol.
# Requires Python >= 3.13 (almond-axol's floor).
# Host requirement NOT installed here: the ZED SDK + its `pyzed` Python bindings
# (not on PyPI — install the ZED SDK, then `axol zed.install`). opencv (cv2) is
# pulled below for the BGRA->RGB frame conversion.
# NOTE: almond-axol maps some deps (e.g. pyroki) to git via [tool.uv.sources], which
# ONLY uv honors. Under pip those bare names fall through to PyPI and fail — pyroki
# isn't published there ("No matching distribution"). We mirror that git source as a
# direct URL here (pinned to almond-axol's rev) so this extra also installs under pip.
axol = [
  "almond-axol @ git+https://github.com/almond-bot/axol.git@6f226c1db5d702a74596d240d0c78edb17775bae",
  "pyroki @ git+https://github.com/chungmin99/pyroki.git@388e43e1fc0d0ee382968d3dd72970fd62a0450c",
  "opencv-python-headless>=4.8",
]

# pip install 'interlatent[yam]'
# Drives I2RT's YAM bimanual arms over CAN via the i2rt driver directly (robot kind
# "yam"; see interlatent.adapters.yam), through a native control loop. No raiden
# dependency — only i2rt + RGB camera libs.
# PYTHON VERSION: i2rt/raiden pin YAM to Python >=3.11,<3.12; confirm i2rt's actual
# floor on install — it may constrain this extra's interpreter below the SDK's range.
# Host requirement NOT pinned here: the ZED SDK + its `pyzed` Python bindings (not on
# PyPI) are needed only for ZED cameras; RealSense cameras use pyrealsense2 below.
# Linux + SocketCAN is required (the arms speak CAN; cameras are RGB-only).
yam = [
  "i2rt @ git+https://github.com/i2rt-robotics/i2rt.git",
  # pyrealsense2 ships wheels ONLY (no sdist) and only for x86_64 Linux/Windows
  # across all Pythons; aarch64 wheels stop at cp310, and there are no macOS wheels
  # at any version. Gating to x86_64 keeps `pip install interlatent[yam]` from hard-
  # failing with "No matching distribution" on ARM/macOS. On those hosts install the
  # RealSense binding out-of-band (apt python3-pyrealsense2, or build librealsense).
  "pyrealsense2>=2.54; platform_machine == 'x86_64'",
  # Generic UVC/V4L2 webcams (e.g. a Logitech on /dev/video2) capture via OpenCV.
  "opencv-python-headless>=4.8",
  "numpy",
  # Embodiment data (URDF, ik_config, kinematic_spec) read via interlatent.robots;
  # see the nori extra and packaging/build_robot_wheel.py for why it is a separate
  # distribution rather than data inside `interlatent`.
  "interlatent-robot-yam>=0.1",
]

# pip install 'interlatent[nori]'
# Drives the Nori robot through its on-Pi daemon (NoriCoreAgent) over the
# Nori-Protocol v1 NDJSON contract on TCP localhost:7777 (robot kind "nori";
# see interlatent.adapters.nori), through a native control loop. Deliberately
# NOT a dependency on the TypeScript @nori/sdk — the wire contract is the
# dependency (vendored for tests at tests/fixtures/nori_protocol/). LAN/on-Pi
# only: the node is expected to run on the robot's Pi next to the daemon.
# All motion safety is enforced daemon-side; the adapter's keep-alive pump is
# liveness-tied so it can never defeat the daemon watchdog (ADR 0015).
nori = [
  # Camera frames arrive on the daemon's companion ZeroMQ MJPEG channel.
  "pyzmq>=25",
  # JPEG decode for those frames (PIL fallback exists but cv2 is the fast path).
  "opencv-python-headless>=4.8",
  "numpy",
  # Embodiment data (URDF, ik_config, kinematic_spec) read via interlatent.robots.
  # A separate distribution, not data inside `interlatent`, because the SDK and
  # the internal engine are both the `interlatent` import package and collide;
  # see packaging/build_robot_wheel.py. Meshes are fetched from its meshes.lock.
  "interlatent-robot-nori>=0.1",
]

[project.scripts]
# Connectivity check: opens a real DRTC session against a managed GPU pod
# with synthetic observations and reports a latency verdict — no robot needed.
interlatent-preflight = "interlatent.inference.integration.preflight:main"
# Daemon that runs on a Pi (or any always-on machine) and converges to
# whatever inference session the dashboard has assigned to the Node.
interlatent-node = "interlatent.node.cli:main"
# One-shot manual move: drive a robot to absolute joint targets and exit.
# `interlatent-act --robot so101 --port /dev/ttyACM0 shoulder_pan=30`. Needs [lerobot].
interlatent-act = "interlatent.node.act_cli:main"
# Thin CLI client for the Interlatent dashboard: list pods/nodes and
# start/stop cloud inference sessions. `interlatent gpus ls`, `session start`, ...
interlatent = "interlatent.cli.main:main"
# Drop-in replacement for `lerobot-record` that captures policy activations
# during recording and uploads them for interpretability. Needs `interlatent[lerobot]`.
interlatent-sync-rollout = "interlatent.adapters.lerobot.sync_inference.sync_rollout:main"

[project.urls]
Homepage = "https://github.com/interlatent/interlatent"
Documentation = "https://github.com/interlatent/interlatent/tree/main/docs"
Issues = "https://github.com/interlatent/interlatent/issues"

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
include = ["interlatent*"]

# ---------------------------------------------------------------------------
# CPU-only torch wheels.
#
# The default PyPI `torch` wheel bundles the full NVIDIA CUDA stack
# (nvidia-cuda-runtime, cudnn, cublas, nvjitlink, ... — several GB) on Linux
# x86_64, even on a machine with no GPU. This SDK is the robot-/edge-side
# package: it uses torch only for CPU-side work — tensor marshalling and
# `isinstance(model, torch.nn.Module)` framework detection in
# interlatent._client — and never calls `.cuda()` / moves data to a GPU. GPU
# inference runs on managed cloud GPU pods over DRTC, not here. So we pin
# torch (and torchvision, pulled in by
# the [lerobot] extra) to PyTorch's CPU wheel index.
#
# This block is honoured by `uv` (uv pip install / uv sync). Plain pip does
# not read index config from pyproject.toml — see the README "Install" section
# for the equivalent `--index-url https://download.pytorch.org/whl/cpu` command.
#
# Note: lerobot ships this same [tool.uv.sources] mechanism but pins to the
# *CUDA* (cu128) index; the override below keeps SDK installs on the CPU index.
# ---------------------------------------------------------------------------
[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
torch = [{ index = "pytorch-cpu" }]
torchvision = [{ index = "pytorch-cpu" }]
