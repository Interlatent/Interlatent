syntax = "proto3";

package interlatent.inference.v1;

// DRTC wire format. Source of truth for both server (engine) and
// client (SDK). Regenerate stubs into both packages with
// scripts/gen_proto.sh.

// One control-rate action with its scheduled step index and the
// monotonic control timestamp it was issued under. Timestamps drive
// the LWW merge on the client: a later timestamp for the same
// action_step always wins.
message Action {
  uint64 action_step = 1;          // global step index in the trajectory
  uint64 control_timestamp = 2;    // monotonic; from the request that produced this action
  repeated float vector = 3;       // raw action vector
}

// A contiguous run of action_steps the client already has scheduled.
// Sent up so the server can reconstruct prior context for RTC
// in-painting without re-shipping the actions themselves.
message Span {
  uint64 start_step = 1;
  uint64 end_step = 2;             // inclusive
}

// One observation frame from the robot.
message Observation {
  string session_id = 1;
  uint64 control_timestamp = 2;    // monotonic; assigned by the client at capture
  uint64 next_action_step = 3;     // first step the server should produce
  repeated Span scheduled_spans = 4;
  // Sensor payload. Kept opaque so this proto does not have to track
  // every robot/env we support. The server's policy_runtime knows how
  // to decode based on session-registered schema.
  bytes payload = 5;
  string payload_codec = 6;        // "npz", "msgpack", "raw_f32", ...
  // Estimated inference latency in control steps, measured by the
  // client's latency estimator. The server feeds this to RTC as the
  // frozen-prefix length so in-painting knows how many leading actions
  // of the new chunk the robot will already have committed by the time
  // the chunk arrives. 0 -> no RTC freezing (cold start).
  uint32 inference_delay = 7;
}

// A chunk of actions the server produced in response to an
// Observation. The client merges these via LWW into its schedule.
message ActionChunk {
  string session_id = 1;
  uint64 control_timestamp = 2;    // mirrors the originating Observation
  uint64 server_timestamp_ns = 3;  // wall-clock at server, for latency stats
  repeated Action actions = 4;
  // Server-side compute time for this chunk (the policy forward), in
  // nanoseconds. The client subtracts it from the measured round-trip
  // to split inference latency into compute vs network.
  uint64 server_compute_ns = 5;
}

// One-time session bootstrap. Tells the server which policy to load
// and how to decode observation payloads. Returns a session handle
// the client uses on every subsequent Observation.
message OpenSessionRequest {
  string model_id = 1;             // Interlatent model_id
  string policy_uri = 2;           // optional override (HF repo, s3://, ...)
  uint32 chunk_size = 3;           // actions per chunk produced by policy
  uint32 min_execution_horizon = 4; // s_min in the DRTC paper
  string payload_codec = 5;        // default codec for this session
  map<string, string> metadata = 6;
  string policy_backend = 7;       // backend name registered in policy_runtime; "" -> "echo"
  uint32 action_dim = 8;           // hint to backend; backends may override
}

message OpenSessionResponse {
  string session_id = 1;
  uint32 chunk_size = 2;
  uint32 action_dim = 3;
}

message CloseSessionRequest {
  string session_id = 1;
}

message CloseSessionResponse {}

// One captured control tick from the robot, streamed independently of
// the inference path so the server can record at the control-loop rate
// (30 Hz) instead of at the Infer rate (~5 Hz with chunked inference).
// Fired by the client in a background thread; never on the hot path.
message RecordTickRequest {
  string session_id = 1;
  uint64 step = 2;                       // Pi's monotonic tick counter
  uint64 control_timestamp = 3;          // monotonic ns at capture
  repeated float observation_state = 4;  // flat joint/state vector
  repeated float action = 5;             // executed action this tick
  // Per-camera JPEG bytes. Keys are short camera names (e.g. "overhead");
  // the server prepends "observation.images." when building the dataset.
  map<string, bytes> jpegs = 6;
  // Who drove this tick. "policy" (default) for policy-driven steps;
  // recorded into the LeRobot dataset as annotation.interlatent.control_source.
  string control_source = 7;
}

message RecordTickResponse {
  bool ok = 1;
}

service InferenceService {
  rpc OpenSession(OpenSessionRequest) returns (OpenSessionResponse);

  // Bidirectional stream so the robot can pipeline observations and
  // the server can push action chunks back as soon as they're ready.
  // Client may also use unary Infer (below) over gRPC-Web where
  // bidi-stream is awkward.
  rpc Stream(stream Observation) returns (stream ActionChunk);

  // Unary fallback for gRPC-Web / simpler clients.
  rpc Infer(Observation) returns (ActionChunk);

  // Stream per-tick captures (obs + executed action + JPEGs) into the
  // server's recorder. Decoupled from Infer so the recorder gets every
  // control tick instead of just the ones where Infer happened to fire.
  rpc RecordTick(RecordTickRequest) returns (RecordTickResponse);

  rpc CloseSession(CloseSessionRequest) returns (CloseSessionResponse);
}
