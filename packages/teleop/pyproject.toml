[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "interlatent-teleop"
version = "0.1.0"
description = "Direct laptop <-> Pi teleoperation over gRPC for Interlatent-supported arms."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Interlatent Contributors" }]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
]
dependencies = [
  "numpy>=1.21",
  "grpcio>=1.60",
  "protobuf>=4.25",
]

[project.optional-dependencies]
# pip install 'interlatent-teleop[laptop]'  — installed on the producer
# machine (laptop/phone bridge). Brings in OpenCV + MediaPipe for the
# hand tracker.
laptop = [
  "opencv-python>=4.8",
  "mediapipe>=0.10",
  # Held-key detection for smooth keyboard teleop. Without this,
  # cv2.waitKey only fires at the OS key-repeat rate (bursty), which
  # makes target trajectories look like staircases instead of ramps.
  # macOS users will be prompted for Accessibility permission on first
  # run of interlatent-teleop-keyboard.
  "pynput>=1.7",
]

# pip install 'interlatent-teleop[so101]'  — installed on the Pi.
# Brings in lerobot for SO-101 follower control. The package itself
# imports lerobot lazily so the mock driver still works without it.
so101 = [
  "lerobot>=0.4.0",
]

[project.scripts]
interlatent-teleop-laptop = "interlatent_teleop.laptop.__main__:main"
interlatent-teleop-keyboard = "interlatent_teleop.laptop.keyboard_cli:main"
interlatent-teleop-pi = "interlatent_teleop.pi.__main__:main"

[project.urls]
Homepage = "https://github.com/interlatent/interlatent"
Issues = "https://github.com/interlatent/interlatent/issues"

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
include = ["interlatent_teleop*"]

[tool.setuptools.package-data]
"interlatent_teleop.protocol" = ["*.proto"]
