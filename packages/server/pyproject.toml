[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "interlatent-server"
version = "0.1.0"
description = "Self-hosted low-latency inference server for VLA / action-chunking policies (DRTC protocol)."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Interlatent Contributors" }]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: POSIX :: Linux",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
  "numpy>=1.21",
  "grpcio>=1.60",
  "protobuf>=4.25",
  "websockets>=12",
  "pillow>=9",
  "httpx>=0.24",
]

[project.optional-dependencies]
# Real policies (SmolVLA, ACT, Pi0, MolmoAct2, ...). Without this extra the
# server still runs with the built-in echo/tiny_torch test backends.
lerobot = [
  "torch>=2.0",
  "lerobot>=0.4.0",
  "huggingface_hub>=0.20",
]
# Server-side episode recording to LeRobot datasets.
recording = [
  "pyarrow>=14",
]

[project.scripts]
interlatent-serve = "interlatent_server.server.app:main"

[project.urls]
Homepage = "https://github.com/interlatent/interlatent"
Documentation = "https://github.com/interlatent/interlatent/tree/main/docs"
Issues = "https://github.com/interlatent/interlatent/issues"

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
include = ["interlatent_server*"]

[tool.setuptools.package-data]
"interlatent_server.protocol" = ["*.proto"]
