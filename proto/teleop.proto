syntax = "proto3";

package interlatent.teleop.v1;

// Wire format for direct laptop <-> Pi teleoperation. No GPU compute in
// the path; this is pure target-pose streaming with control-rate
// interpolation and safety enforcement on the Pi.
//
// Regenerate stubs with packages/interlatent-teleop/scripts/gen_proto.sh.

// One target pose from the producer (laptop / phone / browser).
// Sent at producer rate (~30 Hz for MediaPipe). The Pi consumes the
// latest target at its higher control rate (~50 Hz) and interpolates
// the joint trajectory between targets under a velocity clamp.
message TeleopTarget {
  uint64 control_timestamp = 1;      // monotonic ns at producer
  uint32 sequence = 2;               // monotonically increasing per stream
  repeated float joint_targets = 3;  // length must match OpenTeleopResponse.joint_names
  float confidence = 4;              // 0..1; producer's confidence in this target
  bool deadman_active = 5;           // motion only allowed while true
}

// Per-tick status from the Pi back to the producer. Sent at control
// rate. Lets the producer show current pose, surface safety events,
// and adapt retargeting (e.g. blend toward actual joints to avoid
// snap-back when deadman re-engages).
message TeleopAck {
  uint64 control_timestamp = 1;      // echo of the last applied target
  uint64 server_timestamp_ns = 2;    // monotonic ns at Pi when emitted
  repeated float current_joints = 3; // measured joint positions
  bool estopped = 4;                 // safety latched; targets ignored until clear
  string status_message = 5;         // human-readable reason / state
}

message OpenTeleopRequest {
  string robot_id = 1;               // logical robot identifier on the Pi
  string client_id = 2;              // free-form producer id
  uint32 control_hz = 3;             // requested control rate; Pi may clamp
  string session_token = 4;          // optional bearer; validated server-side
}

message OpenTeleopResponse {
  string session_id = 1;
  uint32 control_hz = 2;             // actual rate the Pi will run
  repeated string joint_names = 3;
  repeated float joint_min = 4;      // workspace bounds (rad / unit)
  repeated float joint_max = 5;
  repeated float home_joints = 6;    // current pose at session open; producer should calibrate against this
  repeated float max_velocity = 7;   // per-joint cap in units/sec used by the Pi clamp
}

message CloseTeleopRequest {
  string session_id = 1;
}

message CloseTeleopResponse {}

service TeleopService {
  // One-time handshake: returns joint schema + safety envelope so the
  // producer can construct correct TeleopTargets.
  rpc OpenTeleop(OpenTeleopRequest) returns (OpenTeleopResponse);

  // Bidirectional control stream. Producer pushes TeleopTarget at its
  // own rate; Pi emits TeleopAck at control rate.
  rpc Stream(stream TeleopTarget) returns (stream TeleopAck);

  rpc CloseTeleop(CloseTeleopRequest) returns (CloseTeleopResponse);
}
